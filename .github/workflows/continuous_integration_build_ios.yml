name: continuous_integration_build_ios
on:
  push:
    branches: ["core"]
  pull_request:
    branches: ["*"]
env:
  target_device_version: 18.5
jobs:
  continuous_integration_build:
    runs-on: macos-latest
    steps:
      - name: git_initialization
        run: git config --global init.defaultBranch core
      - uses: actions/checkout@v5
        with:
          repository: alic3dev/interrupt_handler
          path: interrupt_handler
      - name: make:interrupt_handler_ios
        run: cd interrupt_handler && make target_device_version=${{ env.target_device_version }} target_device=iphone
